<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LorChess</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="game">
  <div class="board-wrap">
    <div class="captured" id="capturedTop"></div>
    <div class="board" id="board"></div>
    <div class="captured" id="capturedBottom"></div>
    <div class="promo" id="promo">
      <div class="promo-box">
        <div>Choose Promotion:</div>
        <div class="options" id="promoOptions"></div>
      </div>
    </div>
  </div>
  <div class="info">
    <div class="userbar" id="userbar"></div>
    <p class="toplink"><a href="/lobby.html">← Lobby</a></p>
    <h2>LorChess</h2>

    <!-- AI-only controls; hidden in PvP (the server fixes color, no depth/undo). -->
    <div id="aiControls">
      <p>Play as:
        <select id="humanColor">
          <option value="w" selected>White</option>
          <option value="b">Black</option>
        </select>
      </p>
      <p>Depth:
        <select id="depth">
          <option value="2" selected>2 (~1400)</option>
          <option value="4">4 (~1800)</option>
        </select>
      </p>
    </div>

    <p id="whiteLabel">White: Human</p>
    <p id="blackLabel">Black: LorFish</p>
    <p id="turn">Turn: White</p>
    <p id="status"></p>
    <h3>PGN</h3>
    <div id="history"></div>
    <p id="gameButtons" style="margin-top:12px;">
      <button id="undoBtn">Undo (R)</button>
      <button id="resetBtn">New Game</button>
      <button id="loadFenBtn">Load FEN</button>
    </p>
    <p style="color:#969696; font-size:12px;">Click a piece, then click a destination.</p>
  </div>
</div>

<div id="fenPanel" class="fen-modal" role="dialog" aria-modal="true" aria-labelledby="fenTitle">
  <div class="fen-modal-box">
    <h3 id="fenTitle">Load FEN</h3>
    <textarea id="fenText" rows="3"
      placeholder="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"></textarea>
    <p>
      <button id="fenLoadBtn">Load</button>
      <button id="fenCancelBtn">Cancel</button>
    </p>
    <div id="fenError" class="fen-error"></div>
  </div>
</div>

<!-- authGuard gates the page. chess.js is served from src/shared (/js); LorFish
     is NOT loaded here — it runs only in the Web Worker. socket.io + net.js are
     used by PvP mode (?id=<gameId>); harmless in AI mode. -->
<script src="/js/authGuard.js"></script>
<script src="/js/chess.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/net.js"></script>
<script src="/js/moveSource.js"></script>
<script src="/js/gameStore.js"></script>
<script src="/js/ui.js"></script>
</body>
</html>
